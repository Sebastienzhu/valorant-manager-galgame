<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VCT电竞经理</title>
</head>
<body>
<div id="vn-root" class="vn-root">
  <style>
    .vn-root {
      min-height: 100vh;
      background: #111417;
      color: #f4f7fb;
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      overflow: hidden;
    }

    .vn-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      position: relative;
      background:
        radial-gradient(circle at 14% 10%, rgba(255, 86, 86, .34), transparent 26%),
        radial-gradient(circle at 86% 18%, rgba(62, 203, 185, .24), transparent 28%),
        linear-gradient(145deg, #15191e 0%, #222126 48%, #171a1f 100%);
    }

    .vn-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.82), rgba(0,0,0,.18));
      pointer-events: none;
    }

    .topbar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px clamp(16px, 4vw, 42px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      background: #ff4d58;
      color: #fff;
      clip-path: polygon(50% 0%, 100% 32%, 88% 100%, 50% 78%, 12% 100%, 0 32%);
      font-weight: 700;
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(20px, 3.8vw, 36px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: #b6c1ca;
      font-size: 13px;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(10, 12, 15, .58);
      padding: 8px 10px;
      border-radius: 6px;
      color: #e9eef4;
      font-size: 13px;
      white-space: nowrap;
    }

    .stage {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(280px, 440px);
      align-items: end;
      gap: clamp(18px, 4vw, 52px);
      padding: 8px clamp(16px, 4vw, 42px) 24px;
    }

    .arena {
      min-height: 430px;
      display: grid;
      align-items: end;
      position: relative;
    }

    .map-title {
      position: absolute;
      top: 8px;
      left: 0;
      display: flex;
      gap: 8px;
      align-items: center;
      color: #c7d3de;
      font-size: 13px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: #35e0b6;
      border-radius: 999px;
      box-shadow: 0 0 16px #35e0b6;
    }

    .portrait-wrap {
      display: grid;
      grid-template-columns: minmax(180px, 360px) minmax(150px, 1fr);
      align-items: end;
      gap: 18px;
    }

    .portrait {
      width: min(36vw, 340px);
      min-width: 210px;
      aspect-ratio: 4 / 5;
      filter: drop-shadow(0 24px 42px rgba(0,0,0,.55));
    }

    .role-card {
      align-self: center;
      border-left: 3px solid #ff5a66;
      padding: 14px 0 14px 16px;
      color: #dde6ee;
      background: linear-gradient(90deg, rgba(255,90,102,.12), transparent 88%);
    }

    .role-card strong {
      display: block;
      font-size: 20px;
      margin-bottom: 6px;
    }

    .role-card span {
      color: #aab7c2;
      font-size: 13px;
      line-height: 1.5;
    }

    .panel {
      align-self: stretch;
      display: grid;
      align-content: end;
      gap: 12px;
    }

    .roster {
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(8, 10, 13, .54);
      backdrop-filter: blur(12px);
      border-radius: 8px;
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .roster h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 500;
      color: #f3f7fb;
    }

    .slots {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .slot {
      min-height: 44px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 6px;
      padding: 8px;
      background: rgba(255,255,255,.045);
      font-size: 12px;
      color: #aeb9c3;
    }

    .slot b {
      display: block;
      color: #f1f5f9;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .dialogue {
      position: relative;
      z-index: 2;
      margin: 0 clamp(16px, 4vw, 42px) clamp(16px, 3vw, 30px);
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(8, 11, 15, .82);
      border-radius: 8px;
      box-shadow: 0 20px 52px rgba(0,0,0,.34);
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .speaker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .speaker b {
      font-size: 18px;
      font-weight: 500;
      color: #fff;
    }

    .speaker span {
      color: #9fb0bd;
      font-size: 13px;
      text-align: right;
    }

    .line {
      min-height: 72px;
      font-size: clamp(16px, 2.2vw, 19px);
      line-height: 1.7;
      color: #eef4f8;
    }

    .choices {
      display: grid;
      gap: 8px;
    }

    button.choice,
    button.utility {
      font: inherit;
      color: #f5f8fb;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      border-radius: 6px;
      padding: 11px 12px;
      text-align: left;
      cursor: pointer;
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }

    button.choice:hover,
    button.utility:hover {
      transform: translateY(-1px);
      border-color: rgba(255,90,102,.7);
      background: rgba(255,90,102,.17);
    }

    button.utility {
      text-align: center;
      background: #ff4d58;
      border-color: #ff4d58;
      font-weight: 500;
    }

    .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: #aeb9c3;
      font-size: 13px;
    }

    .result-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .ending-card {
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      border-radius: 8px;
      padding: 12px;
      color: #dfe7ee;
      font-size: 13px;
      line-height: 1.45;
    }

    .ending-card b {
      display: block;
      color: #fff;
      font-weight: 500;
      margin-bottom: 4px;
    }

    @media (max-width: 820px) {
      .topbar,
      .stage {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
      }

      .stats {
        justify-content: flex-start;
      }

      .stage {
        align-items: stretch;
      }

      .arena {
        min-height: 330px;
      }

      .portrait-wrap {
        grid-template-columns: minmax(160px, 260px) 1fr;
      }

      .portrait {
        width: 240px;
        min-width: 170px;
      }
    }

    @media (max-width: 560px) {
      .topbar {
        display: grid;
      }

      .portrait-wrap {
        grid-template-columns: 1fr;
      }

      .portrait {
        width: min(78vw, 260px);
        margin: 0 auto;
      }

      .role-card {
        padding: 10px 0 10px 12px;
      }

      .slots,
      .result-list {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <div class="vn-shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo">V</div>
        <div>
          <h1>VCT电竞经理</h1>
          <p>地点行动制电竞经理 galgame · stable-20260716</p>
        </div>
      </div>
      <div class="stats" id="stats"></div>
    </header>

    <main class="stage">
      <section class="arena" aria-label="今日地点">
        <div class="map-title"><span class="live-dot"></span><span id="map-name">基地会议室</span></div>
        <div class="portrait-wrap">
          <svg class="portrait" id="portrait" viewBox="0 0 240 300" role="img" aria-label="角色立绘"></svg>
          <div class="role-card">
            <strong id="role-title">战队经理</strong>
            <span id="role-desc">每天选一个地点行动，从三位候选人里搭话。预算、声望、好感度都会影响银河战舰能不能起飞。</span>
          </div>
        </div>
      </section>

      <aside class="panel">
        <section class="roster" aria-label="当前阵容">
          <h2>当前阵容</h2>
          <div class="slots" id="slots"></div>
        </section>
        <section class="roster" aria-label="结局条件">
          <h2>四种结局</h2>
          <div class="result-list">
            <div class="ending-card"><b>夯</b>阵容、预算、声望全在线，银河战舰启动。</div>
            <div class="ending-card"><b>人上人</b>阵容成型，季后赛稳了，但别贷款冠军。</div>
            <div class="ending-card"><b>NPC</b>签了几位能打的，但经理像路人任务发布器。</div>
            <div class="ending-card"><b>拉完了</b>签约失败太多，转型团建主播。</div>
          </div>
        </section>
      </aside>
    </main>

    <section class="dialogue" aria-live="polite">
      <div class="speaker">
        <b id="speaker">系统</b>
        <span id="tagline">点击选项推进</span>
      </div>
      <div class="line" id="line"></div>
      <div class="meta" id="meta"></div>
      <div class="choices" id="choices"></div>
    </section>
  </div>

  <script>
    (() => {
      const maxDays = 10;
      const roles = ["决斗", "先锋", "控场", "哨位", "空栏位"];
      const locations = [
        { id: "snack", name: "零食路", desc: "知名选手最容易刷新的神秘小道。有人买水，有人找酱味大鸡。", fixed: ["zmjjkk", "chichoo", "nobody", "s1mon", "haodong"], event: "snack" },
        { id: "canteen", name: "食堂", desc: "饭点信息量最大，大概率刷新 vookashu、rarga 和正在取东西的 muggle。", fixed: ["vookashu", "rarga", "muggle"], event: "meal" },
        { id: "club", name: "俱乐部", desc: "所有选手都有概率出现，经理的正经工作地点。", fixed: [], event: "club" },
        { id: "store", name: "便利店打工", desc: "大概率遇到 Smoggy、whzy、ZmjjKK，还能赚一点预算。", fixed: ["smoggy", "whzy", "zmjjkk"], event: "work" },
        { id: "dock", name: "码头", desc: "不知道去哪了，去码头整点薯条吧。那里韩国人扎堆，奇妙人物出现率很高。", fixed: ["stew", "chovy", "theshy"], event: "dock" },
        { id: "ad", name: "打广告", desc: "消耗预算换声望。声望高了，狠人更愿意接电话。", fixed: [], event: "ad" }
      ];

      const candidates = [
        player("zmjjkk", "ZmjjKK", "康康", "决斗", "EDG", 5, 28, 70, "#ff5a66", "#ffd166", "狙一响，会议室音量自动加二十。关键词：起狙、酱味大鸡、别急。", [
          ["端上一份酱味大鸡：合同先别急，先补充火力", 29, 9, "康康盯着餐盒：这经理有理解，今天 Operator 都更香了。"],
          ["承诺给他足够的起狙经济，但第二枪必须有人补", 22, 6, "他点头：帅可以，但体系里的帅最值钱。"],
          ["说预算紧，只能先从短枪打起", -8, 0, "康康沉默：老板，你这不是面试，是纯 ECO。"]

          ["跟他说：这赛季感觉是一个轻松的拿下", 24, 8, "whzy 笑了：话别说满，但这句我爱听。"],

          ["开局就喊救世主，输了全队背你", -7, 2, "whzy 苦笑：哥，别奶，真别奶。"]

        player("chichoo", "CHICHOO", "残局厨师长", "哨位", "EDG", 5, 24, 60, "#8b7cf6", "#ffb86c", "残局像慢火炖汤。关键词：绕后、读秒、真会玩。", [
          ["把最后一包零食交给他保管，残局全权信任", 27, 8, "他收下零食：东西交给我，人头也交给我。"],

          ["递给他一套六级听力真题：请读一下对面默认", 28, 9, "他翻了两页：这题简单，对面 A 小有人，B 点在演。"],
          ["承诺先锋位话语权，信息给他来安排", 22, 6, "SiuFatBB：可以，阅读理解要有作答空间。"],
          ["说烟随便封，反正枪硬就赢", -8, 0, "他合上本子：你这阅读理解零分。"]
        ]),
        player("nobody", "nobody", "信息位大师", "先锋", "EDG", 5, 23, 60, "#42d6a4", "#6fb7ff", "一边喝水一边把对面默认摸透。关键词：信息、纪律、别上头。", [

      function player(id, name, nick, role, team, tier, cost, minHype, color, accent, desc, choices) {
        return {
          id,
          name,
          nick,
          role,
          tier,
          cost,
          minHype,
          color,
          accent,
          desc,
          choices: choices.map(([text, favor, hype, line, budget = 0, forceJoin = false]) => ({ text, favor, hype, line, budget, forceJoin }))
        };
      }

      function rand(max) {
        return Math.floor(Math.random() * max);
      }

      function sample(pool, count) {
        const copy = [...pool];
        const out = [];
        while (copy.length && out.length < count) {
          out.push(copy.splice(rand(copy.length), 1)[0]);
        }
        return out;
      }

      function shuffle(list) {
        const copy = [...list];
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = rand(i + 1);
          const temp = copy[i];
          copy[i] = copy[j];
          copy[j] = temp;
        }
        return copy;
      }

      function weightedPick(pool, location) {
        const weights = pool.map((p) => {
          const hypeBoost = Math.floor(state.hype / 35);
          const strengthWeight = Math.max(1, 8 - p.tier + hypeBoost);
          const locationBoost = location && location.fixed.includes(p.id) ? 9 : 0;
          const clubBoost = location && location.id === "club" ? Math.max(0, p.tier - 2) : 0;
          return strengthWeight + locationBoost + clubBoost;
        });
        const total = weights.reduce((sum, weight) => sum + weight, 0);
        let roll = Math.random() * total;
        for (let i = 0; i < pool.length; i += 1) {
          roll -= weights[i];
          if (roll <= 0) return pool[i];
        }
        return pool[0];
      }

      function buildLocationOptions(location) {
        if (location.id === "ad") {
          return [
            { type: "event", title: "拍战队宣传片", cost: 18, hype: 30, line: "你把预算砸进宣传片，片尾写着：银河战舰，正在拼装。声望涨了，财务沉默了。" },

        }));
        const picked = [];
        while (picked.length < 3 && picked.length < pool.length) {
          const rest = pool.filter((p) => !picked.includes(p));
          const next = weightedPick(rest, location);
          picked.push(next);
        }
        return shuffle(picked).map((candidate) => ({ type: "player", candidate }));

            state.roster["教练"] = { ...candidate, favor };
            return { placed: true, slot: "教练", replaced: Boolean(currentCoach) };
          }
          return { placed: false, slot: "教练" };

        const openRole = roles.find((role) => role !== "空栏位" && !state.roster[role]);
        const targetRole = candidate.role === "自由人" ? (openRole || "空栏位") : candidate.role;
        const current = state.roster[targetRole];
        if (!current) {
          state.roster[targetRole] = { ...candidate, favor };
          return { placed: true, slot: targetRole, replaced: false };
        }

        if (targetRole !== "空栏位") {
          const flex = state.roster["空栏位"];
          if (!flex || favor >= flex.favor) {
            state.roster["空栏位"] = { ...candidate, favor };
            return { placed: true, slot: "空栏位", replaced: Boolean(flex) };
          }
        }

        if (favor >= current.favor) {
          state.roster[targetRole] = { ...candidate, favor };
          return { placed: true, slot: targetRole, replaced: true };
        }

        return { placed: false, slot: targetRole };
      }

      function rosterHas(...ids) {
        const activeIds = Object.values(state.roster).map((player) => player.id);
        return ids.every((id) => activeIds.includes(id));
      }

      function rosterCount(ids) {
        const activeIds = Object.values(state.roster).map((player) => player.id);
        return ids.filter((id) => activeIds.includes(id)).length;
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        })[char]);
      }

      function drawPortrait(candidate) {
        const c = candidate || {
          name: "经理",
          nick: "战队经理",
          role: "经理",
          color: "#ff5a66",
          accent: "#42d6a4"
        };

        portraitEl.innerHTML = `
          <defs>
            <linearGradient id="bodyGrad" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stop-color="${c.color}"/>
              <stop offset="1" stop-color="#232a32"/>
            </linearGradient>
            <linearGradient id="visorGrad" x1="0" x2="1">
              <stop offset="0" stop-color="${c.accent}"/>
              <stop offset="1" stop-color="#ffffff"/>
            </linearGradient>
          </defs>
          <path d="M34 292 C42 228 62 190 94 176 L146 176 C180 190 200 228 207 292 Z" fill="url(#bodyGrad)" opacity=".96"/>
          <path d="M70 190 L90 148 L150 148 L172 190 C145 211 99 211 70 190 Z" fill="#202833"/>
          <circle cx="120" cy="104" r="58" fill="#2b3440"/>
          <path d="M70 109 C83 67 105 45 135 50 C162 55 179 80 176 113 C149 94 107 92 70 109 Z" fill="${c.color}"/>
          <path d="M76 112 C104 95 141 95 166 112 L158 136 C134 148 104 148 82 136 Z" fill="url(#visorGrad)" opacity=".9"/>
          <path d="M88 136 C105 151 138 151 154 136 C150 164 134 178 120 178 C106 178 92 164 88 136 Z" fill="#303b48"/>
          <path d="M57 230 L26 249 L38 276 L79 251 Z" fill="${c.accent}" opacity=".9"/>
          <path d="M183 230 L214 249 L202 276 L161 251 Z" fill="${c.accent}" opacity=".9"/>
          <text x="120" y="244" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">${escapeHtml(c.name)}</text>
          <text x="120" y="268" text-anchor="middle" fill="#d9e3ea" font-size="13">${escapeHtml(c.role)} / ${escapeHtml(c.nick)}</text>
        `;
      }

      function updateChrome(candidate) {
        statsEl.innerHTML = `
          <div class="pill">第 ${Math.min(state.day, maxDays)} 天 / ${maxDays}</div>
          <div class="pill">预算 ${state.budget}</div>
          <div class="pill">声望 ${state.hype}</div>
          <div class="pill">已签 ${state.signedIds.length}</div>
        `;

        slotsEl.innerHTML = visibleRoles().map((role) => {
          const player = state.roster[role];
          return `<div class="slot"><b>${role}</b>${player ? escapeHtml(player.name) + " · " + escapeHtml(player.nick) : "空缺，老板正在做梦"}</div>`;
        }).join("");

        mapEl.textContent = state.currentLocation ? state.currentLocation.name : "基地会议室";
        roleTitleEl.textContent = candidate ? `${candidate.name} · ${candidate.role}` : "战队经理";
        roleDescEl.textContent = candidate ? candidate.desc : "每天选一个地点行动，从三位候选人里搭话。预算、声望、好感度都会影响银河战舰能不能起飞。";
        drawPortrait(candidate);
      }

      function setDialogue({ speaker, tag, line, meta = [], choices = [] }) {
        speakerEl.textContent = speaker;
        taglineEl.textContent = tag;
        lineEl.textContent = line;
        metaEl.innerHTML = meta.map((item) => `<span>${escapeHtml(item)}</span>`).join("");
        choicesEl.innerHTML = "";
        choices.forEach((choice) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = choice.primary ? "utility" : "choice";
          button.textContent = choice.text;
          button.addEventListener("click", choice.action);
          choicesEl.appendChild(button);
        });
      }

      function start() {
        updateChrome(null);
        setDialogue({
          speaker: "老板",
          tag: "新赛季立项会",
          line: "你被任命为无畏契约新军经理。老板只给一句话：10 天内凑出银河战舰。预算可以花，但别把食堂也签没了。",
          meta: ["每日流程：选择地点 -> 三选一搭话/行动", "声望越高，强力选手越愿意出现并接电话。"],
          choices: [{ text: "开始第 1 天", primary: true, action: chooseLocation }]
        });
      }

      function chooseLocation() {
        state.currentLocation = null;
        updateChrome(null);
        setDialogue({
          speaker: "第 " + state.day + " 天",
          tag: "选择今日路线",
          line: "今天去哪儿找人？不同地点会刷新不同选手，也可能影响预算和声望。经理的一天，从合理画饼开始。",
          meta: [state.last],
          choices: locations.map((location) => ({
            text: `${location.name}：${location.desc}`,
            action: () => enterLocation(location)
          }))
        });
      }

      function enterLocation(location) {
        state.currentLocation = location;
        const options = buildLocationOptions(location);
        state.currentOptions = options;

        if (location.event === "work") {
          const gain = 6 + rand(15);
          state.budget += gain;
          state.last = `便利店打工赚到 ${gain} 预算，老板说你是财务型经理。`;
        }

        updateChrome(options.find((o) => o.candidate)?.candidate || null);

        setDialogue({
          speaker: location.name,
          tag: "今日刷新",
          line: location.event === "ad" ? "广告部把三个方案放到你面前。花钱买声望，买多了心疼，买少了没人接电话。" : `你来到${location.name}。今天能搭话的目标已经出现，只能选一个，别像排位选英雄一样犹豫到倒计时。`,
          meta: [location.desc, state.last],
          choices: options.map((option) => option.type === "event" ? {
            text: `${option.title}（预算 -${option.cost}，声望 +${option.hype}）`,
            action: () => doEvent(option)
          } : {
            text: `${option.candidate.name} · ${option.candidate.role}（身价 ${option.candidate.cost}，声望门槛 ${option.candidate.minHype}）`,
            action: () => talk(option.candidate)
          })
        });
      }

      function doEvent(event) {
        if (state.budget < event.cost) {
          state.last = "预算不够，广告商看你的眼神像看短枪局。";
        } else {
          state.budget -= event.cost;
          state.hype += event.hype;
          state.last = event.line;
        }
        updateChrome(null);
        setDialogue({
          speaker: "广告行动",
          tag: "今日结算",
          line: state.last,
          meta: [`预算 ${state.budget}`, `声望 ${state.hype}`],
          choices: [{ text: state.day >= maxDays ? "进入最终结算" : "结束今天", primary: true, action: nextDay }]
        });
      }

      function talk(candidate) {
        updateChrome(candidate);
        setDialogue({
          speaker: candidate.name,
          tag: candidate.nick,
          line: `${candidate.name} 出现在${state.currentLocation.name}。你看了一眼报价表：预算要够，声望也不能太低，不然饼画得再圆也像 NPC 对话。`,
          meta: [`位置：${candidate.role}`, `身价：${candidate.cost}`, `声望门槛：${candidate.minHype}`, `当前好感：${state.favor[candidate.id] || 35}`],
          choices: shuffle(candidate.choices).map((choice) => ({
            text: choice.text,
            action: () => resolveTalk(candidate, choice)
          }))
        });
      }

      function resolveTalk(candidate, choice) {
        const before = state.favor[candidate.id] || 35;
        state.budget += choice.budget || 0;
        const hypePenalty = state.hype < candidate.minHype ? Math.ceil((candidate.minHype - state.hype) / 8) : 0;
        const budgetPenalty = state.budget < candidate.cost ? Math.ceil((candidate.cost - state.budget) / 4) : 0;
        const favor = before + choice.favor - hypePenalty - budgetPenalty;
        state.favor[candidate.id] = favor;
        state.hype += choice.hype;

        let result = "";
        const canInvite = choice.forceJoin || (favor >= 58 && state.hype >= candidate.minHype && state.budget >= candidate.cost);
        const almost = favor >= 50 && (state.hype < candidate.minHype || state.budget < candidate.cost);

        if (canInvite) {
          if (!choice.forceJoin) state.budget -= candidate.cost;
          const placement = placePlayer(candidate, favor);
          if (placement.placed) {
            if (!state.signedIds.includes(candidate.id)) state.signedIds.push(candidate.id);
            result = `${candidate.name} 答应加入，${placement.slot} 更新。`;
            if (candidate.id === "siufatbb") {
              state.budget += 888;
              result = "肥公子进了战队心情很好，资助了你 888 预算。";
            }
            if (candidate.id === "after") {
              state.ratingBoost += 80;
              result = "after 加入教练组，你的队伍上升了一个评级。";
            }
            if (candidate.id === "muggle") {
              state.ratingBoost += 40;
              result = "muggle 加入后队伍的外卖费下降了，队内伙食不用愁了，队伍上升了半个评级。";
            }
            if (candidate.id === "chovy" || candidate.id === "theshy") {
              state.trapSigned = candidate.name;
              result = `${candidate.name} 加入了战队。你隐约感觉这个项目组理解错了“跨界引援”。`;
            }
          } else {
            result = `${candidate.name} 愿意来，但当前 ${placement.slot} 好感更高，你选择暂不换人。`;
          }
        } else if (almost) {
          result = `${candidate.name} 被你聊动了，但${state.hype < candidate.minHype ? "声望不够响" : "预算不够厚"}，他说下次再看看。`;
        } else {
          result = `${candidate.name} 礼貌离开。你感觉自己刚才像 NPC，头顶差一个黄色感叹号。`;
        }

        state.last = result;
        updateChrome(candidate);
        setDialogue({
          speaker: candidate.name,
          tag: canInvite ? "邀请成功" : "邀请未成",
          line: `${choice.line} ${result}`,
          meta: [`好感 ${favor}`, `声望 +${choice.hype}`, choice.budget ? `预算 ${choice.budget}` : "选项预算 0", hypePenalty ? `声望惩罚 -${hypePenalty}` : "声望达标", budgetPenalty ? `预算压力 -${budgetPenalty}` : "预算达标"],
          choices: [{ text: state.day >= maxDays ? "进入最终结算" : "结束今天", primary: true, action: nextDay }]
        });
      }

      function nextDay() {
        if (state.day >= maxDays) {
          ending();
          return;
        }
        state.day += 1;
        chooseLocation();
      }

      function ending() {
        const filled = roles.filter((role) => state.roster[role]).length;
        const totalFavor = Object.values(state.roster).reduce((sum, player) => sum + player.favor + player.tier * 8, 0);
        const comboBoosts = [];
        let comboScore = 0;
        if (rosterHas("s1mon", "zmjjkk")) {
          comboScore += 40;
          comboBoosts.push("故人之姿");
        }
        if (rosterHas("whzy", "nobody")) {
          comboScore += 40;
          comboBoosts.push("大哥你们太强了");
        }

        const shotcallers = ["nobody", "nephh", "boaster", "nicc", "forsaken", "flexin", "nats", "haodong", "biank", "kira", "siufatbb"];
        const hasShotcaller = rosterCount(shotcallers) > 0;
        const shotcallerPenalty = hasShotcaller ? 0 : 80;
        const score = totalFavor + state.hype + Math.max(state.budget, -20) + state.ratingBoost + comboScore - shotcallerPenalty;
        const suffix = [
          ...comboBoosts.map((name) => `${name}：队伍评级增加半级。`),
          hasShotcaller ? "" : "你的队内没有人能指挥，队内交通混乱，因此降级一级。"
        ].filter(Boolean).join(" ");
        let title = "";
        let text = "";
        let tag = "";
        const edgBondIds = ["smoggy", "nobody", "zmjjkk", "haodong", "s1mon", "jieni", "cb", "chichoo", "siufatbb"];

        if (state.trapSigned) {
          title = "拉完了 结局：跨界引援翻车";
          tag = "码头惨案复盘";
          text = `你签下了 ${state.trapSigned}，结果发现队里有个完全不会玩的。战术暂停里他说的东西没人听懂，队友都想四宫一了。老板看着阵容表沉默：银河战舰怎么开到码头去了？`;
        } else if (rosterHas("smoggy", "nobody", "zmjjkk", "s1mon", "chichoo")) {
          title = "夯 结局：首尔往事";
          tag = "EDG 圆梦首尔";
          text = "首尔往事：男人女人一生只哭一次，EDG圆梦首尔。旧日羁绊重新亮起，基地门口连夜挂上了“别低估冠军心”的横幅。";
        } else if (rosterHas("aspas", "whzy")) {
          title = "夯 结局：上阵父子兵";
          tag = "老帕歪贼齐同心";
          text = "上阵父子兵，歪贼老帕齐同心，鞋底多粘都能赢。发布会还没开始，老板已经把冠军皮肤的 PPT 标题写好了。";
        } else if (rosterHas("nats", "chichoo")) {
          title = "夯 结局：双影残局组";
          tag = "老纳老衲去哪儿";
          text = "老纳老衲，我们去哪里呀，有你在身高不高也不怕。双哨位把地图打成迷宫，对面进点像走亲戚，走着走着人没了。";
        } else if (rosterHas("zekken", "forsaken")) {
          title = "夯 结局：猩球崛起";
          tag = "猿神降临";
          text = "猩球崛起，猿神降临。Zekken 和 f0rsakeN 一起进点，场面像有人把爆点按钮焊死在 W 键上。";
        } else if (rosterHas("vookashu", "demon1")) {
          title = "夯 结局：毛子瞄准";
          tag = "准星合体";
          text = "毛子瞄准。Vookashu 和 Demon1 一起把准星架起来，对面露半个像素都像主动递交简历。";
        } else if (rosterCount(edgBondIds) >= 3) {
          title = "夯 结局：不要小瞧我们 EDG 的羁绊啊";
          tag = "字母哥羁绊启动";
          text = "不要小瞧我们EDG的羁绊啊。熟悉的 ID 凑到一起，训练室的空气都像回到了某个热血片段，老板边看边说这就是玄学资产。";
        } else if (filled >= 5 && score >= 430) {
          title = "夯 结局：银河战舰，启动！";
          tag = "冠军发布会";
          text = "你凑齐了五个位置，预算虽然像打完长枪局一样残血，但阵容星味拉满。发布会刚开始，弹幕已经刷屏：“CN瓦怎么你了？” 老板在后台擦眼泪：这钱花得像经济学，也像玄学。";
        } else if (filled >= 5 && score >= 330) {
          title = "人上人 结局：季后赛稳了，但别贷款冠军";
          tag = "新赛季出征";
          text = "你的阵容足够能打，训练赛也有不少名场面。虽然还没到银河战舰级别，但至少不是纸飞机。教练组决定先把默认、补枪、暂停练明白，再谈冠军皮肤。";
        } else if (filled >= 3 && score >= 230) {
          title = "NPC 结局：有队，但经理像任务发布器";
          tag = "常规赛开门";
          text = "你签下了几位能打的选手，但阵容还有明显短板。粉丝说这队有说法，黑粉说你像路边 NPC：每天只会说“年轻人，我这里有个任务”。至少故事还没结束，下赛季还能继续画饼。";
        } else {
          title = "拉完了 结局：经理转型团建主播";
          tag = "直播间标题已更新";
          text = "签约谈判接连错过，你的银河战舰还停在 PPT 第一页。老板没有开除你，只是让你负责战队团建直播。你面对镜头苦笑：兄弟们，我真尽力了，下赛季一定不乱画饼。";
        }

        if (!hasShotcaller && title.startsWith("夯")) {
          title = title.replace("夯", "人上人");
          tag = `${tag} · 指挥缺席`;
        }

        updateChrome(null);
        setDialogue({
          speaker: title,
          tag,
          line: suffix ? `${text} ${suffix}` : text,
          meta: [`完整位置 ${filled}/5`, `最终预算 ${state.budget}`, `最终声望 ${state.hype}`, `综合评分 ${score}`],
          choices: [{ text: "重新开档，再造一艘更大的", primary: true, action: reset }]
        });
      }

      function reset() {
        state.day = 1;
        state.budget = 100;
        state.hype = 10;
        state.roster = {};
        state.signedIds = [];
        state.favor = {};
        state.ratingBoost = 0;
        state.trapSigned = "";
        state.currentLocation = null;
        state.currentOptions = [];
        state.last = "经理状态：咖啡因在线，老板画饼在线。";
        start();
      }

      start();
    })();
  </script>
</div>
</body>
</html>
